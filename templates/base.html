<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SlateNotes — An Obsidian-inspired notes app with markdown editing, tagging, search, and pinning.">
    <title>{% block title %}SlateNotes{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{% block body_class %}{% endblock %}">
    <!-- Background Orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <!-- Dot-grid background -->
    <div class="dot-grid"></div>
    <nav class="navbar" id="main-nav">
        <a href="{{ url_for('index') }}" class="nav-brand">
            <span class="nav-icon">📝</span>
            <span class="nav-title">SlateNotes</span>
        </a>
        <div class="nav-left">
            <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">☰</button>
        </div>
        <div class="nav-actions">
            <a href="{{ url_for('new_note') }}" class="btn btn-primary" id="btn-new-note">
                + New
            </a>
        </div>
    </nav>
    {% block body %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% endblock %}
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
